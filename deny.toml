# KERNEL-DEP-BUDGET-0 — workspace dependency policy.
#
# `simthing-sim` direct dependency allowlist is enforced at build time by lib test
# `dependency_gate_rejects_new_simthing_sim_dependency` (see
# `docs/tests/kernel_dep_budget_0_results.md`). Extend that allowlist only after
# DA sign-off.
#
# Optional workspace-wide hygiene (requires `cargo install cargo-deny`):
#   cargo deny check bans

[bans]
multiple-versions = "warn"
wildcards = "allow"

[licenses]
version = 2
confidence-threshold = 0.8

[sources]
unknown-registry = "warn"
unknown-git = "warn"
