name: Doctrine Scan

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

jobs:
  doctrine-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine scanner selftest gate
        id: gate
        shell: bash
        run: |
          set -euo pipefail
          run_selftests=true
          event_name="${{ github.event_name }}"
          base_sha=""
          head_sha="${{ github.sha }}"

          if [[ "$event_name" == "workflow_dispatch" ]]; then
            run_selftests=true
          elif [[ "$event_name" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          elif [[ "$event_name" == "push" ]]; then
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          if [[ "$event_name" != "workflow_dispatch" ]]; then
            if [[ -z "$base_sha" || -z "$head_sha" || "$base_sha" =~ ^0+$ ]]; then
              run_selftests=true
            elif git cat-file -e "${base_sha}^{commit}" && git cat-file -e "${head_sha}^{commit}"; then
              changed_files="$(mktemp)"
              if git diff --name-only "${base_sha}..${head_sha}" >"$changed_files"; then
                if grep -Eq '^(scripts/ci/|\.github/workflows/)' "$changed_files"; then
                  run_selftests=true
                else
                  run_selftests=false
                fi
              else
                run_selftests=true
              fi
            else
              run_selftests=true
            fi
          fi

          echo "run_selftests=${run_selftests}" >>"$GITHUB_OUTPUT"
          echo "scanner selftests: ${run_selftests}"

      - name: Ensure ripgrep
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi

      - name: Scanner selftest gate guard
        run: |
          set -o pipefail
          bash scripts/ci/selftest_gate_guard.sh 2>&1 | tee doctrine-selftest-gate-guard-report.txt

      - name: Sanctioned surface digest freshness
        run: |
          set -o pipefail
          bash scripts/ci/gen_digest.sh --check 2>&1 | tee doctrine-digest-report.txt

      - name: Orientation digest freshness
        run: |
          set -o pipefail
          bash scripts/ci/gen_orientation.sh --check 2>&1 | tee doctrine-orientation-report.txt

      - name: Doctrine anchor integrity
        run: |
          set -o pipefail
          bash scripts/ci/anchor_check.sh --check 2>&1 | tee doctrine-anchor-report.txt

      - name: Orientation receipt selftest
        if: steps.gate.outputs.run_selftests == 'true'
        run: |
          set -o pipefail
          bash scripts/ci/orient.sh --selftest 2>&1 | tee doctrine-orient-selftest-report.txt

      - name: Relay lint selftest
        if: steps.gate.outputs.run_selftests == 'true'
        run: |
          set -o pipefail
          bash scripts/ci/relay_lint.sh --selftest 2>&1 | tee doctrine-relay-selftest-report.txt

      - name: DOC-BUDGET check
        run: |
          set -o pipefail
          bash scripts/ci/doc_budget_check.sh --check 2>&1 | tee doctrine-doc-budget-report.txt

      - name: DOC-BUDGET selftest
        if: steps.gate.outputs.run_selftests == 'true'
        run: |
          set -o pipefail
          bash scripts/ci/doc_budget_check.sh --selftest 2>&1 | tee doctrine-doc-budget-selftest-report.txt

      - name: Rule expiry check
        run: |
          set -o pipefail
          bash scripts/ci/rule_expiry_check.sh --check 2>&1 | tee doctrine-rule-expiry-report.txt

      - name: Lifecycle schema gate (PR inventory/lifecycle TSV)
        if: github.event_name == 'pull_request'
        run: |
          set -o pipefail
          bash scripts/ci/lifecycle_schema_pr_gate.sh \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.sha }}" 2>&1 | tee doctrine-lifecycle-schema-gate-report.txt

      - name: Track-closeout selftest
        if: steps.gate.outputs.run_selftests == 'true'
        run: |
          set -o pipefail
          bash scripts/ci/track_closeout.sh --prove 2>&1 | tee doctrine-track-closeout-selftest-report.txt

      - name: Closeout artifact expiry (wall-clock)
        run: |
          set -o pipefail
          bash scripts/ci/track_closeout.sh --artifact-expiry 2>&1 | tee doctrine-closeout-artifact-expiry-report.txt

      - name: Track-closeout deletion guard (PR)
        if: github.event_name == 'pull_request'
        run: |
          set -o pipefail
          bash scripts/ci/track_closeout.sh --deletion-guard \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.sha }}" 2>&1 | tee doctrine-track-closeout-deletion-guard-report.txt

      - name: AGENTS stub check
        run: |
          set -o pipefail
          bash scripts/ci/agents_stub_check.sh --check 2>&1 | tee doctrine-agents-stub-report.txt

      - name: AGENTS stub selftest
        if: steps.gate.outputs.run_selftests == 'true'
        run: |
          set -o pipefail
          bash scripts/ci/agents_stub_check.sh --selftest 2>&1 | tee doctrine-agents-stub-selftest-report.txt

      - name: Doctrine self-test
        if: steps.gate.outputs.run_selftests == 'true'
        run: |
          set -o pipefail
          bash scripts/ci/doctrine_selftest.sh | tee doctrine-selftest-report.txt

      - name: Doctrine scan (PR delta)
        if: github.event_name == 'pull_request'
        run: |
          set -o pipefail
          bash scripts/ci/doctrine_pr_scan.sh \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.sha }}" | tee doctrine-scan-report.txt

      - name: Triage spam check (PR)
        if: github.event_name == 'pull_request'
        run: |
          set -o pipefail
          bash scripts/ci/inspect_spam_check.sh "${{ github.head_ref }}" > doctrine-triage-report.txt
          cat doctrine-triage-report.txt

      - name: Doctrine scan (whole-tree)
        if: github.event_name == 'push'
        run: |
          set -o pipefail
          bash scripts/ci/doctrine_scan.sh | tee doctrine-scan-report.txt

      - name: Publish doctrine reports
        if: always()
        run: |
          {
            echo "## Doctrine self-test"
            echo '```'
            cat doctrine-selftest-report.txt 2>/dev/null || true
            echo '```'
            echo
            echo "## Sanctioned surface digest freshness"
            echo '```'
            cat doctrine-digest-report.txt 2>/dev/null || true
            echo '```'
            echo
            echo "## Orientation digest freshness"
            echo '```'
            cat doctrine-orientation-report.txt 2>/dev/null || true
            echo '```'
            echo
            echo "## Lifecycle schema gate"
            echo '```'
            cat doctrine-lifecycle-schema-gate-report.txt 2>/dev/null || true
            echo '```'
            echo
            echo "## Doctrine scan"
            echo '```'
            cat doctrine-scan-report.txt 2>/dev/null || true
            echo '```'
            echo
            echo "## Doctrine triage / spam check"
            echo '```'
            cat doctrine-triage-report.txt 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload doctrine reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: doctrine-scan-reports
          path: |
            doctrine-digest-report.txt
            doctrine-orientation-report.txt
            doctrine-lifecycle-schema-gate-report.txt
            doctrine-selftest-report.txt
            doctrine-scan-report.txt
            doctrine-triage-report.txt
          if-no-files-found: ignore
