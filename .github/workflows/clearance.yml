# Sticky CLEARANCE-VERDICT is emitted by scripts/ci/clearance_check.sh (class
# predicates / admitted-envelope routing). This workflow does not default to DA:
# ORCHESTRATOR-CLEARABLE stickies are mergeable by orchestrator; DA-RESERVE is
# only for unmatched/forbidden/novelty/gate-wiring shapes. Widen class envelopes
# (class_predicates.tsv) when design already marks a rung clearable.
name: Clearance

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to clear
        required: true
        type: string
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  clearance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve PR number
        id: pr
        run: |
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            echo "num=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "num=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run clearance_check
        id: clearance
        if: github.event_name != 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -o pipefail
          bash scripts/ci/clearance_check.sh --pr "${{ steps.pr.outputs.num }}" | tee clearance-report.txt

      - name: Write step summary
        if: always() && github.event_name != 'push'
        run: |
          {
            echo "## Clearance Report (PR #${{ steps.pr.outputs.num }})"
            echo ""
            echo '```'
            cat clearance-report.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Sticky PR comment
        if: always() && github.event_name != 'push' && hashFiles('clearance-report.txt') != ''
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          bash scripts/ci/clearance_comment.sh "${{ steps.pr.outputs.num }}" clearance-report.txt

      - name: Handoff ingress and board sync
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -u
          pr="${{ steps.pr.outputs.num }}"
          sync_rc=0
          handoff=""
          resolve_out=""

          # PR-ingress: resolve the handoff and refresh the ingress sticky. PR/dispatch events only;
          # skipped on push to master (no PR to attach a sticky to). Board sync below runs regardless.
          if [ -n "$pr" ]; then
            gh pr view "$pr" --json body -q .body > pr-body.md
            gh pr view "$pr" --json files -q '.files[].path' > changed-files.txt
            # Local-git fallback: the runner's gh --json files intermittently returns an empty
            # list even in-runner (same defect fixed in clearance_check.sh). When empty, resolve
            # the changed set from base...head SHAs (event context; no gh call) via a local diff.
            if [ ! -s changed-files.txt ]; then
              b="${{ github.event.pull_request.base.sha }}"
              h="${{ github.event.pull_request.head.sha }}"
              if [ -z "$b" ] || [ -z "$h" ]; then
                pair="$(gh pr view "$pr" --json baseRefOid,headRefOid -q '.baseRefOid + " " + .headRefOid' 2>/dev/null || true)"
                [ -z "$b" ] && b="${pair%% *}"
                [ -z "$h" ] && h="${pair##* }"
              fi
              if [ -n "$b" ] && [ -n "$h" ] && [ "$b" != "$h" ]; then
                git fetch --no-tags --quiet origin "$b" "$h" 2>/dev/null || true
                git diff --name-only "${b}...${h}" > changed-files.txt 2>/dev/null || true
                [ ! -s changed-files.txt ] && git diff --name-only "$b" "$h" > changed-files.txt 2>/dev/null || true
              fi
            fi
            resolve_out="$(bash scripts/ci/handoff_dispatch.sh --resolve-handoff pr-body.md changed-files.txt 2>&1)"
            resolve_rc=$?
            if [ "$resolve_rc" -eq 0 ]; then
              handoff="$resolve_out"
            else
              sync_rc="$resolve_rc"
            fi
          fi

          gh pr list --state open --json number,title,headRefName,url,isDraft,body > open-prs.raw.json
          if ! bash scripts/ci/handoff_dispatch.sh --normalize-open-prs open-prs.raw.json > open-prs.json; then
            echo '[]' > open-prs.json
            sync_rc=1
          fi
          export HD_OPEN_PRS_JSON="$(cat open-prs.json)"

          if [ -n "$pr" ]; then
            lint_rc=0
            if [ -n "$handoff" ]; then
              if ! bash scripts/ci/handoff_dispatch.sh --render-ingress "$pr" "$handoff" > handoff-ingress.md; then
                lint_rc=1
                cp handoff-ingress.md handoff-ingress.error.md
                { echo "<!-- handoff-ingress-sticky -->"; echo "## Handoff Ingress"; echo ""; echo "- PR: #${pr}"; echo "- handoff: render failed"; echo ""; echo '```'; cat handoff-ingress.error.md; echo '```'; } > handoff-ingress.md
              fi
            else
              { echo "<!-- handoff-ingress-sticky -->"; echo "## Handoff Ingress"; echo ""; echo "- PR: #${pr}"; echo "- handoff: resolution failed"; echo ""; echo '```'; printf '%s\n' "$resolve_out"; echo '```'; } > handoff-ingress.md
            fi
            if [ "$lint_rc" -ne 0 ]; then sync_rc="$lint_rc"; fi
            python3 -c 'import json; print(json.dumps({"body": open("handoff-ingress.md", encoding="utf-8").read()}))' > sticky_payload.json
            comment_id="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${pr}/comments" --paginate --jq '.[] | select(.body | contains("<!-- handoff-ingress-sticky -->")) | .id' | head -n 1)"
            if [ -n "$comment_id" ]; then
              gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" --input sticky_payload.json >/dev/null
            else
              gh api -X POST "repos/${GITHUB_REPOSITORY}/issues/${pr}/comments" --input sticky_payload.json >/dev/null
            fi
          fi

          # Board sync: fires for PR/dispatch AND push-to-master.
          # Push-to-master has no PR ingress, so resolve the live dispatch via graceful
          # --current-handoff (#1342: empty output = none). Keep `none` only when genuinely none.
          if [ -z "$pr" ] && [ -z "$handoff" ]; then
            handoff="$(bash scripts/ci/handoff_dispatch.sh --current-handoff 2>/dev/null || true)"
          fi

          # Board freshness contract: the board MUST be written on EVERY run (especially
          # push-to-master, which is the only sync after a merge), and when any gh input is
          # flaky it MUST self-declare `<STALE DUE TO ...>` rather than silently freeze at a
          # prior snapshot. stale_reasons accumulates flaky-input notes; gh_retry rides out the
          # in-runner 5xx/empty flakiness that previously froze the board.
          stale_reasons=""
          mark_stale() { stale_reasons="${stale_reasons:+${stale_reasons}; }$1"; }
          gh_retry() { local a rc; for a in 1 2 3; do "$@" && return 0; rc=$?; [ "$a" -lt 3 ] && sleep $((a * 2)); done; return "$rc"; }

          if [ -n "$handoff" ]; then
            bash scripts/ci/handoff_dispatch.sh --board-json "$handoff" > simthing-board.json 2>/dev/null \
              || { echo '{"error":"board-json"}' > simthing-board.json; mark_stale "board-json build"; }
          else
            bash scripts/ci/handoff_dispatch.sh --board-json > simthing-board.json 2>/dev/null \
              || { echo '{"error":"board-json"}' > simthing-board.json; mark_stale "board-json build"; }
          fi
          board_render_ok=1
          if ! bash scripts/ci/handoff_dispatch.sh --render-board simthing-board.json > simthing-board.md 2>/dev/null; then
            board_render_ok=0
            mark_stale "board render"
          fi

          # Resolve the board issue number (retry the open-issues read — the flakiest input).
          board_target=""
          if gh_retry gh api "repos/${GITHUB_REPOSITORY}/issues?state=open&per_page=100" --paginate --slurp > board-issues.json 2>/dev/null; then
            board_target="$(bash scripts/ci/handoff_dispatch.sh --board-issue-target board-issues.json 2>/dev/null || true)"
          fi
          [ -z "$board_target" ] && mark_stale "board-issue-target read"

          # Assemble the body. Always write SOMETHING so the board proves it is live: a good
          # render if we have one, else the existing body carried forward (never clobbered with
          # garbage) — either way prefixed with the STALE banner when inputs were flaky.
          if [ "$board_render_ok" -eq 1 ]; then
            cp simthing-board.md board-body.md
          else
            read_issue="${board_target#update }"
            if [ -n "$read_issue" ] && [ "$board_target" != "create" ] \
               && gh_retry gh api "repos/${GITHUB_REPOSITORY}/issues/${read_issue}" --jq .body > board-body.md 2>/dev/null \
               && [ -s board-body.md ]; then
              :
            else
              printf '# SimThing Board\n\n_(render unavailable this run)_\n' > board-body.md
            fi
          fi
          if [ -n "$stale_reasons" ]; then
            { printf '> :warning: `<STALE DUE TO: %s>` — board sync ran at %s but some gh inputs were flaky; time-varying fields (master_head, current_handoff, leases) may lag master. Self-heals on the next clean run.\n\n' \
                "$stale_reasons" "$(date -u +%Y-%m-%dT%H:%M:%SZ)"; cat board-body.md; } > board-body.stamped.md
            mv board-body.stamped.md board-body.md
          fi
          python3 -c 'import json; print(json.dumps({"title": "SimThing Board", "body": open("board-body.md", encoding="utf-8").read()}))' > board_payload.json

          # Write. Always attempt; retry transient write-path 5xx. A final write failure is a
          # ::warning:: (self-heals next run), never a silent no-op and never a red gate.
          if [ -z "$board_target" ]; then
            echo "::warning::SimThing Board not written (could not resolve target issue after retries); ${stale_reasons}"
          elif [ "$board_target" = "create" ]; then
            gh_retry gh api -X POST "repos/${GITHUB_REPOSITORY}/issues" --input board_payload.json >/dev/null 2>&1 \
              || echo "::warning::SimThing Board create failed after retries (transient GitHub write-path); self-heals next run"
          else
            gh_retry gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/${board_target#update }" --input board_payload.json >/dev/null 2>&1 \
              || echo "::warning::SimThing Board update failed after retries (transient GitHub write-path); self-heals next run"
          fi

          exit "$sync_rc"

      - name: Upload clearance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clearance-report-pr-${{ steps.pr.outputs.num }}
          path: clearance-report.txt
          if-no-files-found: ignore
