# Sticky CLEARANCE-VERDICT is emitted by scripts/ci/clearance_check.sh (class
# predicates / admitted-envelope routing). This workflow does not default to DA:
# ORCHESTRATOR-CLEARABLE stickies are mergeable by orchestrator; DA-RESERVE is
# only for unmatched/forbidden/novelty/gate-wiring shapes. Widen class envelopes
# (class_predicates.tsv) when design already marks a rung clearable.
name: Clearance

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to clear
        required: true
        type: string
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  clearance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve PR number
        id: pr
        run: |
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            echo "num=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "num=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run clearance_check
        id: clearance
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -o pipefail
          bash scripts/ci/clearance_check.sh --pr "${{ steps.pr.outputs.num }}" | tee clearance-report.txt

      - name: Write step summary
        if: always()
        run: |
          {
            echo "## Clearance Report (PR #${{ steps.pr.outputs.num }})"
            echo ""
            echo '```'
            cat clearance-report.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Sticky PR comment
        if: always() && hashFiles('clearance-report.txt') != ''
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          bash scripts/ci/clearance_comment.sh "${{ steps.pr.outputs.num }}" clearance-report.txt

      - name: Handoff ingress and board sync
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -u
          pr="${{ steps.pr.outputs.num }}"
          sync_rc=0
          gh pr view "$pr" --json body -q .body > pr-body.md
          gh pr view "$pr" --json files -q '.files[].path' > changed-files.txt
          handoff=""
          resolve_out="$(bash scripts/ci/handoff_dispatch.sh --resolve-handoff pr-body.md changed-files.txt 2>&1)"
          resolve_rc=$?
          if [ "$resolve_rc" -eq 0 ]; then
            handoff="$resolve_out"
          else
            sync_rc="$resolve_rc"
          fi

          gh pr list --state open --json number,title,headRefName,url,isDraft,body > open-prs.raw.json
          if ! bash scripts/ci/handoff_dispatch.sh --normalize-open-prs open-prs.raw.json > open-prs.json; then
            echo '[]' > open-prs.json
            sync_rc=1
          fi
          export HD_OPEN_PRS_JSON="$(cat open-prs.json)"

          lint_rc=0
          render_rc=0
          {
            echo "<!-- handoff-ingress-sticky -->"
            echo "## Handoff Ingress"
            echo ""
            echo "- PR: #${pr}"
            if [ -n "$handoff" ]; then
              echo "- handoff: \`${handoff}\`"
              echo ""
              echo '```'
              bash scripts/ci/handoff_dispatch.sh --lint "$handoff"
              lint_rc=$?
              echo '```'
              echo ""
              echo '```'
              bash scripts/ci/handoff_dispatch.sh --render coding "$handoff"
              render_rc=$?
              echo '```'
              if [ "$render_rc" -ne 0 ]; then
                echo ""
                echo "- coding projection blocked; orchestrator and DA projections remain inspectable."
              fi
            else
              echo "- handoff: resolution failed"
              echo ""
              echo '```'
              printf '%s\n' "$resolve_out"
              echo '```'
            fi
          } > handoff-ingress.md
          if [ "$lint_rc" -ne 0 ]; then
            sync_rc="$lint_rc"
          fi

          if [ -n "$handoff" ]; then
            bash scripts/ci/handoff_dispatch.sh --board-json "$handoff" > simthing-board.json || echo '{"error":"board-json"}' > simthing-board.json
          else
            bash scripts/ci/handoff_dispatch.sh --board-json > simthing-board.json || echo '{"error":"board-json"}' > simthing-board.json
          fi
          if ! bash scripts/ci/handoff_dispatch.sh --render-board simthing-board.json > simthing-board.md; then
            sync_rc=1
          fi

          python3 - <<'PY' > sticky_payload.json
          import json
          body = open("handoff-ingress.md", encoding="utf-8").read()
          print(json.dumps({"body": body}))
          PY
          comment_id="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${pr}/comments" --paginate \
            --jq '.[] | select(.body | contains("<!-- handoff-ingress-sticky -->")) | .id' | head -n 1)"
          if [ -n "$comment_id" ]; then
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" --input sticky_payload.json >/dev/null
          else
            gh api -X POST "repos/${GITHUB_REPOSITORY}/issues/${pr}/comments" --input sticky_payload.json >/dev/null
          fi

          python3 - <<'PY' > board_payload.json
          import json
          body = open("simthing-board.md", encoding="utf-8").read()
          print(json.dumps({"title": "SimThing Board", "body": body}))
          PY
          gh api "repos/${GITHUB_REPOSITORY}/issues?state=open&per_page=100" > board-issues.json
          board_target="$(bash scripts/ci/handoff_dispatch.sh --board-issue-target board-issues.json 2>&1)"
          board_target_rc=$?
          if [ "$board_target_rc" -ne 0 ]; then
            printf '%s\n' "$board_target"
            sync_rc="$board_target_rc"
          elif [ "$board_target" = "create" ]; then
            gh api -X POST "repos/${GITHUB_REPOSITORY}/issues" --input board_payload.json >/dev/null
          else
            issue_num="${board_target#update }"
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/${issue_num}" --input board_payload.json >/dev/null
          fi

          exit "$sync_rc"

      - name: Upload clearance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clearance-report-pr-${{ steps.pr.outputs.num }}
          path: clearance-report.txt
          if-no-files-found: ignore
