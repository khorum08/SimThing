        with:
          ref: ${{ needs.parse-command.outputs.checkout_ref }}
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Run anchor report
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
