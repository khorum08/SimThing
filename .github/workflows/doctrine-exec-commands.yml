name: Doctrine Exec Commands

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

jobs:
  parse-command:
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null) ||
      (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/handoff')) ||
      github.event_name == 'pull_request_review' ||
      github.event_name == 'pull_request_review_comment'
    runs-on: ubuntu-latest
    outputs:
      command: ${{ steps.parse.outputs.command }}
      plan: ${{ steps.parse.outputs.plan }}
      profile: ${{ steps.parse.outputs.profile }}
      probe: ${{ steps.parse.outputs.probe }}
      triage_scan: ${{ steps.parse.outputs.triage_scan }}
      triage_outcome: ${{ steps.parse.outputs.triage_outcome }}
      triage_reason: ${{ steps.parse.outputs.triage_reason }}
      orient_role: ${{ steps.parse.outputs.orient_role }}
      anchor_target: ${{ steps.parse.outputs.anchor_target }}
      handoff_action: ${{ steps.parse.outputs.handoff_action }}
      handoff_text_b64: ${{ steps.parse.outputs.handoff_text_b64 }}
      issue_number: ${{ steps.context.outputs.issue_number }}
      pr_number: ${{ steps.context.outputs.pr_number }}
      head_sha: ${{ steps.context.outputs.head_sha }}
      base_sha: ${{ steps.context.outputs.base_sha }}
      head_ref: ${{ steps.context.outputs.head_ref }}
      checkout_ref: ${{ steps.context.outputs.checkout_ref }}
      is_collaborator: ${{ steps.auth.outputs.is_collaborator }}
      is_owner: ${{ steps.auth.outputs.is_owner }}
      is_fork: ${{ steps.auth.outputs.is_fork }}
      requester: ${{ steps.auth.outputs.requester }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve PR context
        id: context
        run: |
          set -euo pipefail
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          ISSUE_NUMBER=""
          if [[ "${{ github.event_name }}" == "issue_comment" ]]; then
            ISSUE_NUMBER="${{ github.event.issue.number }}"
            if [[ "${{ github.event.issue.pull_request != null }}" == "true" ]]; then
              PR="${{ github.event.issue.number }}"
              JSON="$(gh api "repos/${{ github.repository }}/pulls/${PR}")"
              HEAD="$(echo "$JSON" | jq -r '.head.sha')"
              BASE="$(echo "$JSON" | jq -r '.base.sha')"
              HEAD_REF="$(echo "$JSON" | jq -r '.head.ref')"
              MERGED="$(echo "$JSON" | jq -r '.merged')"
              MERGE_SHA="$(echo "$JSON" | jq -r '.merge_commit_sha // empty')"
              CHECKOUT_REF="${HEAD_REF}"
              if [[ "$MERGED" == "true" && -n "$MERGE_SHA" ]]; then
                CHECKOUT_REF="${MERGE_SHA}"
              fi
            else
              PR=""
              BRANCH_JSON="$(gh api "repos/${{ github.repository }}/branches/${DEFAULT_BRANCH}")"
              HEAD="$(echo "$BRANCH_JSON" | jq -r '.commit.sha')"
              BASE="${HEAD}"
              HEAD_REF="${DEFAULT_BRANCH}"
              CHECKOUT_REF="${DEFAULT_BRANCH}"
            fi
          elif [[ "${{ github.event_name }}" == "pull_request_review" ]]; then
            PR="${{ github.event.pull_request.number }}"
            ISSUE_NUMBER="${PR}"
            JSON='${{ toJson(github.event.pull_request) }}'
            HEAD="$(echo "$JSON" | jq -r '.head.sha')"
            BASE="$(echo "$JSON" | jq -r '.base.sha')"
            HEAD_REF="$(echo "$JSON" | jq -r '.head.ref')"
            MERGED="$(echo "$JSON" | jq -r '.merged')"
            MERGE_SHA="$(echo "$JSON" | jq -r '.merge_commit_sha // empty')"
            CHECKOUT_REF="${HEAD_REF}"
            if [[ "$MERGED" == "true" && -n "$MERGE_SHA" ]]; then
              CHECKOUT_REF="${MERGE_SHA}"
            fi
          else
            PR="${{ github.event.pull_request.number }}"
            ISSUE_NUMBER="${PR}"
            JSON='${{ toJson(github.event.pull_request) }}'
            HEAD="$(echo "$JSON" | jq -r '.head.sha')"
            BASE="$(echo "$JSON" | jq -r '.base.sha')"
            HEAD_REF="$(echo "$JSON" | jq -r '.head.ref')"
            MERGED="$(echo "$JSON" | jq -r '.merged')"
            MERGE_SHA="$(echo "$JSON" | jq -r '.merge_commit_sha // empty')"
            CHECKOUT_REF="${HEAD_REF}"
            if [[ "$MERGED" == "true" && -n "$MERGE_SHA" ]]; then
              CHECKOUT_REF="${MERGE_SHA}"
            fi
          fi
          {
            echo "issue_number=${ISSUE_NUMBER}"
            echo "pr_number=${PR}"
            echo "head_sha=${HEAD}"
            echo "base_sha=${BASE}"
            echo "head_ref=${HEAD_REF}"
            echo "checkout_ref=${CHECKOUT_REF}"
          } >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Collaborator and fork checks
        id: auth
        run: |
          set -euo pipefail
          ASSOC=""
          REQUESTER=""
          if [[ "${{ github.event_name }}" == "issue_comment" ]]; then
            ASSOC="${{ github.event.comment.author_association }}"
            REQUESTER="${{ github.event.comment.user.login }}"
          elif [[ "${{ github.event_name }}" == "pull_request_review" ]]; then
            ASSOC="${{ github.event.review.author_association }}"
            REQUESTER="${{ github.event.review.user.login }}"
          else
            ASSOC="${{ github.event.comment.author_association }}"
            REQUESTER="${{ github.event.comment.user.login }}"
          fi
          IS_COLLAB="false"
          case "$ASSOC" in
            OWNER|MEMBER|COLLABORATOR) IS_COLLAB="true" ;;
          esac
          IS_OWNER="false"
          if [[ "$ASSOC" == "OWNER" ]]; then
            IS_OWNER="true"
          fi
          IS_FORK="false"
          if [[ "${{ github.event_name }}" == "pull_request_review" ]]; then
            if [[ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]]; then
              IS_FORK="true"
            fi
          elif [[ "${{ github.event_name }}" == "pull_request_review_comment" ]]; then
            if [[ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]]; then
              IS_FORK="true"
            fi
          else
            if [[ -n "${{ steps.context.outputs.pr_number }}" ]]; then
              PR_JSON="$(gh api "repos/${{ github.repository }}/pulls/${{ steps.context.outputs.pr_number }}")"
              if [[ "$(echo "$PR_JSON" | jq -r '.head.repo.full_name')" != "${{ github.repository }}" ]]; then
                IS_FORK="true"
              fi
            fi
          fi
          echo "is_collaborator=${IS_COLLAB}" >> "$GITHUB_OUTPUT"
          echo "is_owner=${IS_OWNER}" >> "$GITHUB_OUTPUT"
          echo "is_fork=${IS_FORK}" >> "$GITHUB_OUTPUT"
          echo "requester=${REQUESTER}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Parse command body
        id: parse
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          set -euo pipefail
          OUT="$(bash scripts/ci/doctrine_exec_commands.sh 2>&1 || true)"
          echo "$OUT"
          CMD="$(echo "$OUT" | awk -F': ' '/^COMMAND: /{print $2; exit}')"
          if [[ -z "$CMD" || "$CMD" == "ignore" ]]; then
            echo "command=ignore" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$CMD" == "triage-invalid" ]]; then
            echo "command=triage-invalid" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$CMD" == "handoff-invalid" ]]; then
            echo "command=handoff-invalid" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$CMD" == handoff* ]]; then
            echo "command=handoff" >> "$GITHUB_OUTPUT"
            ACTION="$(echo "$CMD" | sed -n 's/.*action=\([^ ]*\).*/\1/p')"
            TEXT_B64="$(echo "$OUT" | awk -F': ' '/^HANDOFF_TEXT_B64: /{print $2; exit}')"
            echo "handoff_action=${ACTION}" >> "$GITHUB_OUTPUT"
            echo "handoff_text_b64=${TEXT_B64}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$CMD" == seal-proof-rejected* ]]; then
            echo "command=seal-proof-rejected" >> "$GITHUB_OUTPUT"
            PROFILE="$(echo "$CMD" | sed -n 's/.*profile=\([^ ]*\).*/\1/p')"
            echo "profile=${PROFILE}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$CMD" == seal-proof* ]]; then
            echo "command=seal-proof" >> "$GITHUB_OUTPUT"
            PLAN="$(echo "$CMD" | sed -n 's/.*plan=\([^ ]*\).*/\1/p')"
            PROFILE="$(echo "$CMD" | sed -n 's/.*profile=\([^ ]*\).*/\1/p')"
            PROBE="$(echo "$CMD" | sed -n 's/.*probe=\([^ ]*\).*/\1/p')"
            [[ -n "$PROFILE" ]] || PROFILE="ci-b-webchat-smoke"
            echo "plan=${PLAN:-false}" >> "$GITHUB_OUTPUT"
            echo "profile=${PROFILE}" >> "$GITHUB_OUTPUT"
            echo "probe=${PROBE}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$CMD" == triage* ]]; then
            echo "command=triage" >> "$GITHUB_OUTPUT"
            echo "triage_scan=$(echo "$CMD" | sed -n 's/.*scan=\([^ ]*\).*/\1/p')" >> "$GITHUB_OUTPUT"
            echo "triage_outcome=$(echo "$CMD" | sed -n 's/.*outcome=\([^ ]*\).*/\1/p')" >> "$GITHUB_OUTPUT"
            echo "triage_reason=$(echo "$CMD" | sed -n 's/.*reason=\(.*\)/\1/p')" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$CMD" == clearance* ]]; then
            echo "command=clearance" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$CMD" == relay-lint* ]]; then
            echo "command=relay-lint" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$CMD" == orient* ]]; then
            echo "command=orient" >> "$GITHUB_OUTPUT"
            ROLE="$(echo "$CMD" | sed -n 's/.*role=\([^ ]*\).*/\1/p')"
            [[ -n "$ROLE" ]] || ROLE="orchestrator"
            echo "orient_role=${ROLE}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$CMD" == anchor* ]]; then
            echo "command=anchor" >> "$GITHUB_OUTPUT"
            TARGET="$(echo "$CMD" | sed -n 's/.*target=\([^ ]*\).*/\1/p')"
            echo "anchor_target=${TARGET}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "command=ignore" >> "$GITHUB_OUTPUT"

  dispatch-seal-proof:
    needs: parse-command
    if: |
      needs.parse-command.outputs.command == 'seal-proof' &&
      needs.parse-command.outputs.is_collaborator == 'true' &&
      needs.parse-command.outputs.is_fork == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch doctrine-exec workflow (run/probe/profile)
        if: needs.parse-command.outputs.plan != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run doctrine-exec.yml \
            -f pr="${{ needs.parse-command.outputs.pr_number }}" \
            -f head_sha="${{ needs.parse-command.outputs.head_sha }}" \
            -f base_sha="${{ needs.parse-command.outputs.base_sha }}" \
            -f profile="${{ needs.parse-command.outputs.profile }}" \
            -f probe="${{ needs.parse-command.outputs.probe }}" \
            -f plan=false
          echo "Dispatched doctrine-exec for PR ${{ needs.parse-command.outputs.pr_number }}"

      - name: Plan mode (no workflow dispatch)
        if: needs.parse-command.outputs.plan == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.parse-command.outputs.head_sha }}

      - name: Post plan output to sticky comment
        if: needs.parse-command.outputs.plan == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          DOCTRINE_EXEC_PROFILE: ${{ needs.parse-command.outputs.profile }}
        run: |
          bash scripts/ci/doctrine_exec_plan.sh --profile "${{ needs.parse-command.outputs.profile }}" > doctrine-exec-report.txt
          {
            echo "DOCTRINE-EXEC-PLAN (no runner execution)"
            echo "pr: ${{ needs.parse-command.outputs.pr_number }}"
            echo "head_sha: ${{ needs.parse-command.outputs.head_sha }}"
            echo "base_sha: ${{ needs.parse-command.outputs.base_sha }}"
            echo "tested_ref: n/a (plan mode)"
            echo "merge_ref_status: n/a"
            echo "workflow_run_id: ${{ github.run_id }}"
            echo "job_id: ${{ github.job }}"
          } >> doctrine-exec-report.txt
          echo "DOCTRINE-EXEC-VERDICT: PASS plan-only profile=${{ needs.parse-command.outputs.profile }} head_sha=${{ needs.parse-command.outputs.head_sha }}" >> doctrine-exec-report.txt
          bash scripts/ci/doctrine_exec_comment.sh "${{ needs.parse-command.outputs.pr_number }}" doctrine-exec-report.txt

  reject-owner-deep-seal-proof:
    needs: parse-command
    if: |
      needs.parse-command.outputs.command == 'seal-proof-rejected' &&
      needs.parse-command.outputs.is_collaborator == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Post owner-deep rejection
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ needs.parse-command.outputs.pr_number }}" --body "DOCTRINE-EXEC-VERDICT: FAIL rejected owner-deep profile=${{ needs.parse-command.outputs.profile }} from /seal-proof comment path. Use workflow_dispatch with owner_deep=true."

  triage-append:
    needs: parse-command
    if: |
      needs.parse-command.outputs.command == 'triage' &&
      needs.parse-command.outputs.is_collaborator == 'true' &&
      needs.parse-command.outputs.is_fork == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.parse-command.outputs.head_ref }}
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Append triage row
        run: |
          bash scripts/ci/doctrine_exec_triage.sh \
            "${{ needs.parse-command.outputs.triage_scan }}" \
            "${{ needs.parse-command.outputs.triage_outcome }}" \
            "${{ needs.parse-command.outputs.triage_reason }}" \
            "${{ needs.parse-command.outputs.head_ref }}" \
            "${{ needs.parse-command.outputs.head_sha }}"

      - name: Commit triage row to PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/ci/triage_log.tsv
          git commit -m "triage: ${{ needs.parse-command.outputs.triage_scan }} ${{ needs.parse-command.outputs.triage_outcome }} (CI-B-GH-TRIAGE-0)"
          git push origin "HEAD:${{ needs.parse-command.outputs.head_ref }}"

  reject-malformed-triage:
    needs: parse-command
    if: |
      needs.parse-command.outputs.command == 'triage-invalid' &&
      needs.parse-command.outputs.is_collaborator == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Post malformed triage format
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ needs.parse-command.outputs.pr_number }}" --body "FORMAT: /triage <scan-id> <delete|green|escalate> <reason>"

  reject-malformed-handoff:
    needs: parse-command
    if: |
      needs.parse-command.outputs.command == 'handoff-invalid' &&
      needs.parse-command.outputs.is_collaborator == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Post malformed handoff format
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ needs.parse-command.outputs.issue_number }}" --body "FORMAT: /handoff approve | /handoff amend: <text> | /handoff hold | /handoff status"

  handoff-owner-review:
    needs: parse-command
    if: |
      needs.parse-command.outputs.command == 'handoff' &&
      needs.parse-command.outputs.handoff_action != 'status' &&
      needs.parse-command.outputs.is_owner != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Route non-owner mutation to owner review
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          bash scripts/ci/handoff_dispatch.sh \
            --owner-review-reply \
            "${{ needs.parse-command.outputs.requester }}" \
            "${{ needs.parse-command.outputs.handoff_action }}" > handoff-owner-review.txt
          gh issue comment "${{ needs.parse-command.outputs.issue_number }}" --body-file handoff-owner-review.txt

  handoff-status:
    needs: parse-command
    if: |
      needs.parse-command.outputs.command == 'handoff' &&
      needs.parse-command.outputs.handoff_action == 'status' &&
      needs.parse-command.outputs.is_collaborator == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.parse-command.outputs.checkout_ref }}
          fetch-depth: 0
      - name: Post current handoff board digest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          handoff="$(bash scripts/ci/handoff_dispatch.sh --current-handoff)"
          gh pr list --state open --json number,title,headRefName,url,isDraft,body > open-prs.raw.json
          bash scripts/ci/handoff_dispatch.sh --normalize-open-prs open-prs.raw.json > open-prs.json
          export HD_OPEN_PRS_JSON="$(cat open-prs.json)"
          bash scripts/ci/handoff_dispatch.sh --owner-status "$handoff" > handoff-status.md
          gh issue comment "${{ needs.parse-command.outputs.issue_number }}" --body-file handoff-status.md

  handoff-owner-mutate:
    needs: parse-command
    if: |
      needs.parse-command.outputs.command == 'handoff' &&
      needs.parse-command.outputs.handoff_action != 'status' &&
      needs.parse-command.outputs.is_owner == 'true' &&
      needs.parse-command.outputs.is_fork == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.parse-command.outputs.head_ref }}
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Apply owner handoff command
        env:
          HANDOFF_TEXT_B64: ${{ needs.parse-command.outputs.handoff_text_b64 }}
        run: |
          set -euo pipefail
          handoff="$(bash scripts/ci/handoff_dispatch.sh --current-handoff)"
          python3 - <<'PY' > handoff-note.txt
          import base64
          import os
          raw = os.environ.get("HANDOFF_TEXT_B64", "")
          print(base64.urlsafe_b64decode(raw.encode("ascii")).decode("utf-8"), end="")
          PY
          if [[ "${{ needs.parse-command.outputs.handoff_action }}" == "amend" ]]; then
            bash scripts/ci/handoff_dispatch.sh \
              --owner-command "$handoff" amend handoff-note.txt > handoff-command-report.txt
          else
            bash scripts/ci/handoff_dispatch.sh \
              --owner-command "$handoff" "${{ needs.parse-command.outputs.handoff_action }}" > handoff-command-report.txt
          fi
          echo "handoff_path=${handoff}" >> "$GITHUB_ENV"

      - name: Commit owner handoff mutation
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- "${handoff_path}"; then
            echo "No handoff mutation to commit."
            exit 0
          fi
          rung="$(sed -n 's/^rung: //p' "${handoff_path}" | head -n 1)"
          git add "${handoff_path}"
          git commit -m "handoff: ${{ needs.parse-command.outputs.handoff_action }} ${rung} (HD-OWNER-INTERFACE-0)"
          git push origin "HEAD:${{ needs.parse-command.outputs.head_ref }}"

      - name: Re-render handoff mirrors and reply
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          {
            echo "## Handoff Command"
            echo ""
            echo '```'
            cat handoff-command-report.txt
            echo '```'
          } > handoff-command-reply.md
          gh issue comment "${{ needs.parse-command.outputs.issue_number }}" --body-file handoff-command-reply.md

          gh pr list --state open --json number,title,headRefName,url,isDraft,body > open-prs.raw.json
          bash scripts/ci/handoff_dispatch.sh --normalize-open-prs open-prs.raw.json > open-prs.json
          export HD_OPEN_PRS_JSON="$(cat open-prs.json)"
          bash scripts/ci/handoff_dispatch.sh --board-json "${handoff_path}" > simthing-board.json
          bash scripts/ci/handoff_dispatch.sh --render-board simthing-board.json > simthing-board.md
          python3 - <<'PY' > board_payload.json
          import json
          body = open("simthing-board.md", encoding="utf-8").read()
          print(json.dumps({"title": "SimThing Board", "body": body}))
          PY
          gh api "repos/${GITHUB_REPOSITORY}/issues?state=open&per_page=100" --paginate --slurp > board-issues.json
          board_target="$(bash scripts/ci/handoff_dispatch.sh --board-issue-target board-issues.json)"
          if [ "$board_target" = "create" ]; then
            gh api -X POST "repos/${GITHUB_REPOSITORY}/issues" --input board_payload.json >/dev/null
          else
            issue_num="${board_target#update }"
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/${issue_num}" --input board_payload.json >/dev/null
          fi

          if [[ -n "${{ needs.parse-command.outputs.pr_number }}" ]]; then
            if bash scripts/ci/handoff_dispatch.sh --render-ingress "${{ needs.parse-command.outputs.pr_number }}" "${handoff_path}" > handoff-ingress.md; then
              python3 - <<'PY' > sticky_payload.json
              import json
              body = open("handoff-ingress.md", encoding="utf-8").read()
              print(json.dumps({"body": body}))
              PY
              comment_id="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${{ needs.parse-command.outputs.pr_number }}/comments" --paginate \
                --jq '.[] | select(.body | contains("<!-- handoff-ingress-sticky -->")) | .id' | head -n 1)"
              if [ -n "$comment_id" ]; then
                gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" --input sticky_payload.json >/dev/null
              else
                gh api -X POST "repos/${GITHUB_REPOSITORY}/issues/${{ needs.parse-command.outputs.pr_number }}/comments" --input sticky_payload.json >/dev/null
              fi
            fi
          fi

  clearance-run:
    needs: parse-command
    if: |
      needs.parse-command.outputs.command == 'clearance' &&
      needs.parse-command.outputs.is_collaborator == 'true' &&
      needs.parse-command.outputs.is_fork == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.parse-command.outputs.checkout_ref }}
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Post PENDING clearance placeholder (head-bound; prevents stale-sticky misread)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "pr: ${{ needs.parse-command.outputs.pr_number }}"
            echo "head_sha: ${{ needs.parse-command.outputs.head_sha }}"
            echo "workflow_run_id: ${{ github.run_id }}"
            echo "CLEARANCE-STATUS: PENDING - clearance running for this head; no CLEARANCE-VERDICT yet. Wait for the verdict; sticky lag is not a mismatch."
          } > clearance-pending.txt
          bash scripts/ci/doctrine_exec_clearance_comment.sh \
            "${{ needs.parse-command.outputs.pr_number }}" clearance-pending.txt

      - name: Run clearance router
        id: clearance
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CLEARANCE_LEDGER_APPEND: "0"
        run: |
          set -euo pipefail
          bash scripts/ci/clearance_check.sh --pr "${{ needs.parse-command.outputs.pr_number }}" > clearance-report.txt
          VERDICT="$(grep '^CLEARANCE-VERDICT:' clearance-report.txt | tail -n 1)"
          CLASS="$(awk -F'\t' 'NR>1 && $1 ~ /tp-/ {print $1; exit}' scripts/ci/precedented_classes.tsv || echo unknown)"
          {
            echo "pr: ${{ needs.parse-command.outputs.pr_number }}"
            echo "head_sha: ${{ needs.parse-command.outputs.head_sha }}"
            echo "base_sha: ${{ needs.parse-command.outputs.base_sha }}"
            echo "workflow_run_id: ${{ github.run_id }}"
            echo "${VERDICT}"
          } >> clearance-report.txt
          echo "verdict=${VERDICT}" >> "$GITHUB_OUTPUT"

      - name: Post clearance verdict comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash scripts/ci/doctrine_exec_clearance_comment.sh \
            "${{ needs.parse-command.outputs.pr_number }}" clearance-report.txt

  relay-lint-run:
    needs: parse-command
    if: |
      needs.parse-command.outputs.command == 'relay-lint' &&
      needs.parse-command.outputs.is_collaborator == 'true' &&
      needs.parse-command.outputs.is_fork == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.parse-command.outputs.checkout_ref }}
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Run relay lint
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          bash scripts/ci/doctrine_exec_relay_lint.sh \
            "${{ needs.parse-command.outputs.pr_number }}" relay-lint-report.txt
          {
            echo "pr: ${{ needs.parse-command.outputs.pr_number }}"
            echo "head_sha: ${{ needs.parse-command.outputs.head_sha }}"
            echo "base_sha: ${{ needs.parse-command.outputs.base_sha }}"
            echo "workflow_run_id: ${{ github.run_id }}"
          } >> relay-lint-report.txt

      - name: Post relay lint comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash scripts/ci/doctrine_exec_relay_lint_comment.sh \
            "${{ needs.parse-command.outputs.pr_number }}" relay-lint-report.txt

  orient-run:
    needs: parse-command
    if: |
      needs.parse-command.outputs.command == 'orient' &&
      needs.parse-command.outputs.is_collaborator == 'true' &&
      needs.parse-command.outputs.is_fork == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.parse-command.outputs.checkout_ref }}
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Run orientation digest
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          bash scripts/ci/doctrine_exec_orient.sh \
            "${{ needs.parse-command.outputs.orient_role }}" \
            orient-report.txt \
            "${{ needs.parse-command.outputs.head_sha }}" \
            "${{ needs.parse-command.outputs.base_sha }}" \
            "${{ needs.parse-command.outputs.pr_number }}"
          {
            echo "workflow_run_id: ${{ github.run_id }}"
          } >> orient-report.txt

      - name: Post orientation comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash scripts/ci/doctrine_exec_orient_comment.sh \
            "${{ needs.parse-command.outputs.pr_number }}" orient-report.txt

  anchor-run:
    needs: parse-command
    if: |
      needs.parse-command.outputs.command == 'anchor' &&
      needs.parse-command.outputs.is_collaborator == 'true' &&
      needs.parse-command.outputs.is_fork == 'false'
    runs-on: ubuntu-latest
    steps:
